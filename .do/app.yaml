name: refind
region: sfo
ingress:
  rules:
    - component:
        name: frontend
      match:
        path:
          prefix: /
services:
  - name: frontend
    github:
      repo: rishabhcli/ReFind
      branch: post-submission-edits
      deploy_on_push: true
    dockerfile_path: frontend/Dockerfile
    source_dir: frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        type: GENERAL
        value: production
      - key: DEV_AUTH_ENABLED
        scope: RUN_TIME
        type: GENERAL
        value: "false"
      - key: NEXT_PUBLIC_AGENT_API_URL
        scope: RUN_TIME
        type: GENERAL
        value: http://backend:8000
      - key: UNKEY_API_ID
        scope: RUN_TIME
        type: GENERAL
        value: replace-with-unkey-api-id
      - key: UNKEY_ROOT_KEY
        scope: RUN_TIME
        type: SECRET
        value: replace-with-unkey-root-key
  - name: backend
    github:
      repo: rishabhcli/ReFind
      branch: post-submission-edits
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
    envs:
      - key: FRONTEND_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${APP_URL}
